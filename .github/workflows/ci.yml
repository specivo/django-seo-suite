name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: py${{ matrix.python }} / Django ${{ matrix.django }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Latest release of each supported Django major line (4.2 LTS, 5.2 LTS, 6.0).
        python: ["3.10", "3.11", "3.12", "3.13"]
        django: ["4.2", "5.2", "6.0"]
        exclude:
          - { python: "3.13", django: "4.2" }   # Django 4.2 supports up to Python 3.12
          - { python: "3.10", django: "6.0" }    # Django 6.0 requires Python 3.12+
          - { python: "3.11", django: "6.0" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install "Django~=${{ matrix.django }}.0" pytest pytest-django pytest-cov
          pip install -e .
      - name: Test (contrib on, sites off)
        run: pytest -q
      - name: Test (sites on)
        env: { SEO_SUITE_TEST_SITES: "1" }
        run: pytest -q
      - name: Test (no contrib)
        env: { SEO_SUITE_TEST_NO_CONTRIB: "1" }
        run: pytest -q
      - name: Test (pro extension installed)
        env: { SEO_SUITE_TEST_PRO: "1" }
        run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check seo_suite tests

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
