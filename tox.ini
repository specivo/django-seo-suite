[tox]
envlist =
    py{310,311,312}-dj42
    py{310,311,312}-dj50
    py{310,311,312,313}-dj51
    py{310,311,312,313}-dj52
    flags-py312-dj52-{sites,nocontrib,pro}
    lint
skip_missing_interpreters = true

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313

[testenv]
deps =
    pytest>=7.0
    pytest-django>=4.5
    pytest-cov
    dj42: Django>=4.2,<4.3
    dj50: Django>=5.0,<5.1
    dj51: Django>=5.1,<5.2
    dj52: Django>=5.2,<5.3
setenv =
    DJANGO_SETTINGS_MODULE = tests.settings_test
    sites: SEO_SUITE_TEST_SITES=1
    nocontrib: SEO_SUITE_TEST_NO_CONTRIB=1
    pro: SEO_SUITE_TEST_PRO=1
commands =
    pytest {posargs}

[testenv:lint]
skip_install = true
deps = ruff
commands =
    ruff check seo_suite tests
